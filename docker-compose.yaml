x-common-env: &common-env
  POSTGRES_USER: postgres_user
  POSTGRES_PASSWORD: postgres_password
  POSTGRES_DB: mydb
  POSTGRES_HOST: crypto-postgres
  POSTGRES_PORT: 5432
services:
  crypto-postgres:
    image: postgres:18.3-bookworm
    environment:
      <<: *common-env
      # - POSTGRES_USER=${POSTGRES_USER}
      # - POSTGRES_DB=${POSTGRES_DB}
      # - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5

    restart: always


  crypto-postgres-migrate:
    image: migrate/migrate:4
    depends_on:
      crypto-postgres:
        condition: service_healthy
    volumes:
      - ./migrations:/migrations
    command:
      - "-path"
      - "/migrations"
      - "-database"
      - "postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@crypto-postgres:5432/${POSTGRES_DB}?sslmode=disable"
      - "up"
  
  crypto-app:
    build:
      context: .
      dockerfile: docker/Dockerfile
  
    depends_on:
      crypto-postgres:
        condition: service_healthy
    
    environment:
      <<: *common-env
      # DB_HOST: crypto-postgres
      # DB_PORT: "5432"
      # - DB_USER=${POSTGRES_USER}
      # - DB_PASSWORD=${POSTGRES_PASSWORD}
      # - DB_NAME=${POSTGRES_DB}
    ports:
      - "8080:8080"
    restart: on-failure
  
